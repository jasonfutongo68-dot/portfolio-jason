<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Jason Futongo</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>

<body class="font-sans flex flex-col min-h-screen">

    <!-- HEADER -->
    <header class="flex justify-between items-center px-10 py-6">
        <a href="index.html" class="text-xl font-semibold">
            Jason Futongo
        </a>

        <nav>
            <ul class="flex gap-8 text-gray-700">
                <li><a href="CV.html" class="hover:underline">CV</a></li>
                <li><a href="Projets.html" class="hover:underline">Projets</a></li>
                <li><a href="#" class="hover:underline">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="flex-grow flex items-center justify-center px-4">

        <section class="max-w-6xl w-full py-16">

            <div class="grid md:grid-cols-2 gap-16">

                <div>
                    <h2 class="text-xl font-semibold mb-8">Contact</h2>

                    <div class="mb-6">
                        <p class="font-semibold">Phone</p>
                        <p class="text-sm mt-1">+243 823862290</p>
                    </div>

                    <div>
                        <p class="font-semibold">Email</p>
                        <p class="text-sm mt-1">jasonfutongo68@email.com</p>
                    </div>
                </div>

                <form class="space-y-6">

                    <div class="grid md:grid-cols-2 gap-6">
                        <div>
                            <label class="text-sm">Nom</label>
                            <input type="text" class="w-full border p-3 mt-1 outline-none">
                        </div>

                        <div>
                            <label class="text-sm">Prénom</label>
                            <input type="text" class="w-full border p-3 mt-1 outline-none">
                        </div>
                    </div>

                    <div class="grid md:grid-cols-2 gap-6">
                        <div>
                            <label class="text-sm">Email</label>
                            <input type="email" class="w-full border p-3 mt-1 outline-none">
                        </div>

                        <div>
                            <label class="text-sm">Subject</label>
                            <input type="text" class="w-full border p-3 mt-1 outline-none">
                        </div>
                    </div>

                    <div class="grid md:grid-cols-2 gap-6 items-center">

                        <div>
                            <label class="text-sm">Message</label>
                            <textarea class="w-full border p-3 mt-1 h-32 outline-none"></textarea>
                        </div>

                        <div class="flex justify-center md:justify-start">
                            <button class="w-40 h-40 bg-yellow-500 rounded-full flex items-center justify-center font-semibold hover:opacity-80 transition">
                                Envoyer
                            </button>
                        </div>

                    </div>

                </form>
            </div>

        </section>
    </main>

    <footer class="border-t px-10 py-8 text-sm">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center">

            <div class="mb-6 md:mb-0">
                <h4 class="font-semibold mb-1">Téléphone</h4>
                <p class="text-gray-700">+243 823862290</p>
            </div>

            <div class="mb-6 md:mb-0">
                <h4 class="font-semibold mb-1">Email</h4>
                <p class="text-gray-700">jasonfutongo68@email.com</p>
            </div>

            <div class="mb-6 md:mb-0">
                <h4 class="font-semibold mb-1">Suivez-moi</h4>
                <div class="flex gap-4 text-xl">
                    <a href="#"><i class="bi bi-instagram"></i></a>
                    <a href="#"><i class="bi bi-linkedin"></i></a>
                    <a href="#"><i class="bi bi-twitter"></i></a>
                </div>
            </div>

            <p class="text-gray-700">© 2026 By Jason Futongo</p>
